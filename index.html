<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>unfolder</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; }
      #app { display: flex; height: 100vh; width: 100vw; }
      #viewport, #net { flex: 1 1 0; min-width: 0; height: 100%; position: relative; }
      #viewport { background: #1a1a1a; }
      #net {
        background: #f5f5f0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
      }
      .piece-card {
        background: #fff;
        border: 1px solid #ddd;
        padding: 8px;
      }
      .piece-card h3 {
        margin: 0 0 4px;
        font: 12px/1.2 system-ui, sans-serif;
        color: #444;
      }
      .piece-svg svg { width: 100%; height: auto; display: block; }
      @media (max-aspect-ratio: 1/1) {
        #app { flex-direction: column; }
        #viewport, #net { width: 100%; height: auto; min-height: 0; }
        #viewport { height: 50vh; }
        #net { height: 50vh; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>
      <div id="net"></div>
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
