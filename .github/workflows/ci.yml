name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm test:run
      - run: pnpm build

      - name: Baseline guard
        env:
          BASELINE_CHANGE_ALLOWED: ${{ contains(github.event.pull_request.labels.*.name, 'baseline-change') }}
        run: |
          pnpm baseline
          if git diff --exit-code -I '^Generated by' docs/baseline-pipeline.md; then
            echo "Baseline document unchanged (ignoring date-stamp header)."
            exit 0
          fi
          if [ "$BASELINE_CHANGE_ALLOWED" = "true" ]; then
            echo "Baseline document changed; 'baseline-change' label present — allowing intentional regeneration."
            exit 0
          fi
          echo "::error file=docs/baseline-pipeline.md::Baseline document changed. If this is intentional, add the 'baseline-change' label to the PR."
          exit 1
