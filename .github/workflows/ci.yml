name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm test:run
      - run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Playwright e2e
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Baseline guard
        env:
          BASELINE_CHANGE_ALLOWED: ${{ contains(github.event.pull_request.labels.*.name, 'baseline-change') }}
        run: |
          pnpm baseline
          live_dirty=0
          frozen_dirty=0
          if ! git diff --exit-code -I '^Generated by' docs/baseline-pipeline.md; then
            live_dirty=1
          fi
          if ! git diff --exit-code docs/baseline-v3.md; then
            frozen_dirty=1
          fi
          if [ "$live_dirty" = "0" ] && [ "$frozen_dirty" = "0" ]; then
            echo "Baseline documents unchanged (ignoring date-stamp header on docs/baseline-pipeline.md)."
            exit 0
          fi
          if [ "$BASELINE_CHANGE_ALLOWED" = "true" ]; then
            echo "Baseline document(s) changed; 'baseline-change' label present — allowing intentional regeneration."
            exit 0
          fi
          if [ "$live_dirty" = "1" ]; then
            echo "::error file=docs/baseline-pipeline.md::Baseline document changed. If this is intentional, add the 'baseline-change' label to the PR."
          fi
          if [ "$frozen_dirty" = "1" ]; then
            echo "::error file=docs/baseline-v3.md::Frozen v3 baseline changed. If this is intentional, add the 'baseline-change' label to the PR."
          fi
          exit 1
